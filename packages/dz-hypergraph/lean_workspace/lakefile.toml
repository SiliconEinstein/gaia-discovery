# Discovery Zero Lean Workspace
# Lean 4 project with Mathlib for formal verification of mathematical discoveries.
# See: https://github.com/leanprover-community/mathlib4/wiki/Using-mathlib4-as-a-dependency

name = "discovery_zero"
version = "0.1.0"
defaultTargets = ["Discovery"]

# 使用 GitHub 镜像（按顺序尝试，可改回 scope 方式）
# 若拉取失败，请重试 scripts/setup_lean_full.sh
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "master"

[[lean_lib]]
name = "Discovery"
srcDir = "Discovery"
