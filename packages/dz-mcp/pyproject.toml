[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dz-mcp"
version = "0.1.0"
description = "MCP server for Discovery Zero modular stack"
requires-python = ">=3.12"
dependencies = [
  "dz-engine",
  "mcp",
]

[project.scripts]
dz-mcp = "dz_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/dz_mcp"]
