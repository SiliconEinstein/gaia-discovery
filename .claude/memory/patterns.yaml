# Patterns — Confirmed Ways to Do Things in This Project
# Each entry is a checklist for a common task. Follow these to avoid pitfalls.
# Lifecycle: expires 6 months after date.

- id: pat-001
  date: 2026-05-01
  title: gd explore 单轮 6-phase 工作流
  domain: workflow
  when_to_use: |
    运行 `gd explore --project <id>` 一轮迭代；主 agent 读 project
    目录 → sub-agent 分派 → verify → formalize → BP → 下一轮。
  steps:
    - |
      Plan：主 agent 读 projects/<id>/{PROBLEM.md, target.json, USER_HINTS.md,
      plan.gaia.py} + iter_{N-1}/last_iter.json，生成 claim + strategy/operator
      + action list 写回 plan.gaia.py。action_kind ∈ ALL_ACTIONS(8)。
    - |
      Dispatch：dispatcher.scan_actions 读 plan IR → ActionSignal[]；
      orchestrator ThreadPoolExecutor(4) 并发 subagent.run_subagent；
      每个 action_id 对应一个 task_results/<action_id>.md + evidence.json。
    - |
      Verify：evidence.json POST → verify-server，
      ACTION_KIND_TO_ROUTER 分派到 quant/struct/heur；
      返回 VerificationOutput（verdict + 可选 inconclusive_reason）。
    - |
      Formalize：verdict=verified 的 claim 走 gaia.formalize_named_strategy
      + append_evidence_subgraph 回注 LocalCanonicalGraph（append-only）。
    - |
      Belief update：belief_ingest patch plan.gaia.py，
      BP 跑 run_review，snapshot 写 runs/<iter>/{belief_snapshot, review}.json。
    - |
      Next-iter：下一轮主 agent 读回注入状态启动；
      refuted → SyntheticRejection；工作假设 → SyntheticHypothesis。
  verification:
    - runs/<iter>/subagent_results.json 每条有非空 evidence_path
    - verification.json verdict ∈ {verified, refuted, inconclusive}
    - check_invariants.py 7 项全过

- id: pat-002
  date: 2026-05-03
  title: 大块代码改完先跑 e2e smoke 再继续
  domain: workflow
  when_to_use: |
    改 dispatcher / orchestrator / subagent / backends / verify_server
    任一核心模块之后，下一步之前。
  steps:
    - |
      schema smoke：python -c "from gd.verify_server.schemas import *;
      assert ALL_ACTIONS == [...] and ACTION_KIND_TO_ROUTER == {...}"
    - |
      单测：cd /root/personal/gaia-discovery-v3 && python -m pytest
      tests/unit/ -x -q （目标 184/184 全过；dispatcher 10/10、
      orchestrator/runner/subagent/belief_ingest 41/41、e2e 1/1）
    - |
      check_invariants：python scripts/check_invariants.py（7 项全 OK 才算绿）
    - |
      EARS smoke：触发一次 ears/ears-trace hook，确认 trace.md 有
      <!-- concepts: ... --> 标签
  verification:
    - pytest exit code 0
    - check_invariants.py exit code 0
    - 任一项红即停，不能进入下一块改动

- id: pat-003
  date: 2026-05-03
  title: trace → distill → memory → CLAUDE.md 四级晋升
  domain: knowledge
  when_to_use: |
    想沉淀经验：从 "这次碰到的" 到 "团队规矩" 的完整路径。
  steps:
    - |
      层 1 瞬时：PostToolUse hook `[EARS]` 提示 → 追加到最近 trace.md
      + <!-- concepts: ... --> 标签。3 min 内写，不写套话。
    - |
      层 2 蒸馏：完成一批工作（或新领域攒到 3+ 条 trace）后跑
      /distill <concept>，从 trace 抽模式写进
      .claude/memory/{decisions,pitfalls,patterns}.yaml。
    - |
      层 3 晋升：同一条模式在 memory 里攒到 [N >= 5, strength=strong]
      是 CLAUDE.md 候选；agent 标 promote，人工决定。
    - |
      层 4 固化：进 CLAUDE.md 或 check_invariants.py 强约束的条目
      从 memory 归档到 .claude/memory/archived/。
  verification:
    - /reflect 跑得出至少 1 条新 memory entry
    - memory yaml 条目带 id/date/title + 领域专用字段
    - CLAUDE.md 晋升条目必须有 memory 里 ≥5 次命中记录

- id: pat-004
  date: 2026-05-09
  title: rubric-anticipator 在 iter 0.5 做一次性 grader 覆盖预测
  domain: workflow
  when_to_use: |
    任何有 hidden rubric 的 open problem。在写完初始 plan.gaia.py 后、
    第一次 dispatch 前跑 rubric-anticipator，预测 grader 会给每个子问题
    打哪些评分 bullet。用 bullet 清单指导 claim 粒度（1 bullet ≈ 1 子断言）
    和 FINAL_ANSWER 覆盖。
  steps:
    - |
      iter 0: 写 q_main + settings + target claim + 初始 foundation claims。
      此时 sub-agent 未 dispatch，claims 是 draft 级别。
    - |
      iter 0.5: 跑 rubric-anticipator agent。输入 PROBLEM.md + plan.gaia.py
      当前草稿，输出 50 个 anticipated grader bullets [B1..B50]，
      每个 bullet 标注对应子问题和评分维度。
    - |
      回到 plan.gaia.py：检查每个 bullet 是否有对应 claim 或
      TEXT_ONLY 覆盖。gap 补 claim，overlap 合并。
    - |
      FINAL_ANSWER 阶段：每个子问题下建 "Anticipated grader bullets"
      子节，逐 bullet 标注覆盖位置（BP_COVERED / TEXT_ONLY）。
    - |
      auditor 在 FINAL_ANSWER 前跑最终 bullet 覆盖审计。
  verification:
    - rubric-anticipator 恰跑一次（iter 0.5）
    - auditor 确认 bullet 覆盖率 = 100%
    - FINAL_ANSWER 含逐 bullet 映射表

- id: pat-005
  date: 2026-05-09
  title: 多 agent 质量管道：oracle→red-team→pi-reviewer→auditor
  domain: workflow
  when_to_use: |
    BP 循环完成后、写 FINAL_ANSWER 前。需要 4 个 advisory agent
    依序跑完，各自独立判断，前一个的输出 inform 下一个。
  steps:
    - |
      oracle（iter 1 末）：在第二轮 dispatch 前跑。读所有 evidence.json
      做 UCB 排序，建议哪些 claim 最值得下一轮 refine。避免在 hopeless
      claim 上浪费 dispatch budget。
    - |
      red-team（iter 2）：挑 verified claims（belief > 0.65）做对抗
      falsification。每条 verified claim 输出 3-5 个 failure mode。
      用于 FINAL_ANSWER 里加 caveats 和 qualification。
    - |
      pi-reviewer（iter 3 / FINAL_ANSWER 前）：整体质量门。检查
      claim 正确性、citation 精度、逻辑连贯性、未覆盖子问题。
      输出 numbered defects list（每项 actionable）。
    - |
      auditor（FINAL_ANSWER 前）：逐 bullet 覆盖审计。对比
      rubric-anticipator 的 50 bullets 和 FINAL_ANSWER 内容，
      输出 covered/at-risk/uncovered 矩阵。
  verification:
    - oracle 输出 UCB ranking table
    - red-team 为每条 verified claim 输出 ≥3 failure modes
    - pi-reviewer defects ≤5（否则 FINAL_ANSWER 不可提交）
    - auditor 覆盖率 = 100%
